<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://xmlns.jcp.org/jsf/passthrough">
<h:head>
    <title>Основная страница</title>
    <h:outputStylesheet name="css/main.css"/>
    <link rel="icon" type="image/x-icon" href="#{resource['images/favicon.ico']}" id = "favicon"/>
</h:head>
<h:body>
    <div class="glass-container users-choice">
        <h:form id="mainForm">
            <label>Выберите X</label>
            <div class="choice-x">
                <h:commandLink value="-3" action="#{pointBean.setX(-3)}" styleClass="glass-option #{pointBean.x == -3 ? 'active' : ''}"/>
                <h:commandLink value="-2" action="#{pointBean.setX(-2)}" styleClass="glass-option #{pointBean.x == -2 ? 'active' : ''}"/>
                <h:commandLink value="-1" action="#{pointBean.setX(-1)}" styleClass="glass-option #{pointBean.x == -1 ? 'active' : ''}"/>
                <h:commandLink value="0" action="#{pointBean.setX(0)}" styleClass="glass-option #{pointBean.x == 0 ? 'active' : ''}"/>
                <h:commandLink value="1" action="#{pointBean.setX(1)}" styleClass="glass-option #{pointBean.x == 1 ? 'active' : ''}"/>
                <h:commandLink value="2" action="#{pointBean.setX(2)}" styleClass="glass-option #{pointBean.x == 2 ? 'active' : ''}"/>
                <h:commandLink value="3" action="#{pointBean.setX(3)}" styleClass="glass-option #{pointBean.x == 3 ? 'active' : ''}"/>
                <h:commandLink value="4" action="#{pointBean.setX(4)}" styleClass="glass-option #{pointBean.x == 4 ? 'active' : ''}"/>
                <h:commandLink value="5" action="#{pointBean.setX(5)}" styleClass="glass-option #{pointBean.x == 5 ? 'active' : ''}"/>
            </div>

            <div class="choice-y">
                <label>Введите Y</label>
                <h:inputText id="input-y" value="#{pointBean.y}" styleClass="glass-input"
                             p:placeholder="От -3 до 3">
                </h:inputText>
            </div>

            <label>Выберите R</label>
            <div class="choice-r">
                <h:commandButton value="1" action="#{pointBean.setRadius(1)}" styleClass="glass-option #{pointBean.radius == 1 ? 'active' : ''}">
                    <f:ajax execute="@this" render="@none" onevent="handleRadiusChange(1)"/>
                </h:commandButton>
                <h:commandButton value="1.5" action="#{pointBean.setRadius(1.5)}" styleClass="glass-option #{pointBean.radius == 1.5 ? 'active' : ''}">
                    <f:ajax execute="@this" render="@none" onevent="handleRadiusChange(1.5)"/>
                </h:commandButton>
                <h:commandButton value="2" action="#{pointBean.setRadius(2)}" styleClass="glass-option #{pointBean.radius == 2 ? 'active' : ''}">
                    <f:ajax execute="@this" render="@none" onevent="handleRadiusChange(2)"/>
                </h:commandButton>
                <h:commandButton value="2.5" action="#{pointBean.setRadius(2.5)}" styleClass="glass-option #{pointBean.radius == 2.5 ? 'active' : ''}">
                    <f:ajax execute="@this" render="@none" onevent="handleRadiusChange(2.5)"/>
                </h:commandButton>
                <h:commandButton value="3" action="#{pointBean.setRadius(3)}" styleClass="glass-option #{pointBean.radius == 3 ? 'active' : ''}">
                    <f:ajax execute="@this" render="@none" onevent="handleRadiusChange(3)"/>
                </h:commandButton>
            </div>
            <div class="error-message" style="color: red; display: #{not empty pointBean.errorMessage ? 'block' : 'none'}">
                #{pointBean.errorMessage}
            </div>
            <div class="helper">
                <h:commandButton value="Отправить" action="#{pointBean.submit}" styleClass="glass-button"/>
                <h:commandButton value="Очистить" action="#{pointBean.clear}" styleClass="glass-button"/>
            </div>
        </h:form>
    </div>
    <div class="graph">
        <h3>Координатная плоскость</h3>
        <svg id="svg" data-r-value="#{pointBean.radius}" xmlns="http://www.w3.org/2000/svg" width="300" height="300" class="svg-graph">
            <!-- Оси -->
            <line x1="0" x2="300" y1="150" y2="150"></line>
            <line x1="150" x2="150" y1="0" y2="300"></line>
            <text x="285" y="135">X</text>
            <text x="160" y="15">Y</text>
            <polygon points="150,0 145,15 155,15" fill="white"></polygon>
            <polygon points="300,150 285,145 285,155" fill="white"></polygon>
            <!-- Фигуры -->
            <polygon points="150,150 50,150 50,50 150,50" fill="#6f8ab7"></polygon>
            <path d="M 150 150 L 200 150 C 200 120 180 100 150 100 Z" fill="#6f8ab7"></path>
            <polygon points="150,150 50,150 150,250" fill="#6f8ab7"></polygon>
            <!-- Палочки -->
            <line x1="50" x2="50" y1="143" y2="157"></line>
            <line x1="100" x2="100" y1="143" y2="157"></line>
            <line x1="200" x2="200" y1="143" y2="157"></line>
            <line x1="250" x2="250" y1="143" y2="157"></line>
            <line x1="143" x2="157" y1="50" y2="50"></line>
            <line x1="143" x2="157" y1="100" y2="100"></line>
            <line x1="143" x2="157" y1="200" y2="200"></line>
            <line x1="143" x2="157" y1="250" y2="250"></line>
            <!-- Значения R на оси X -->
            <text x="40" y="138">-R</text>
            <text x="85" y="138">-R/2</text>
            <text x="190" y="138">R/2</text>
            <text x="245" y="138">R</text>
            <!-- Значения R на оси Y -->
            <text x="162" y="54">R</text>
            <text x="162" y="104">R/2</text>
            <text x="162" y="204">-R/2</text>
            <text x="162" y="254">-R</text>
            <!-- Точка -->
            <circle
                    id="dot"
                    cx="150"
                    cy="150"
                    r="5"
                    fill="#red"
                    style="display: none"></circle>
        </svg>
        <div id="graphError" class="error-message" style="display: none;">
            <span id="graphErrorText"></span>
        </div>
    </div>
    <h:form id="graphForm">
        <h:inputHidden id="graphX" value="#{pointBean.graphX}"/>
        <h:inputHidden id="graphY" value="#{pointBean.graphY}"/>
        <h:commandButton id="graphSubmit" value="Submit from Graph"
                         action="#{pointBean.submitFromGraph}"
                         style="display: none"/>
    </h:form>
    <div class="table-container">
        <h:form id="resultsForm">
            <h:dataTable value="#{pointBean.results}" var="result"
                         styleClass="table" headerClass="table-header">
                <h:column>
                    <f:facet name="header">X</f:facet>
                    #{result.x}
                </h:column>
                <h:column>
                    <f:facet name="header">Y</f:facet>
                    #{result.y}
                </h:column>
                <h:column>
                    <f:facet name="header">R</f:facet>
                    #{result.r}
                </h:column>
                <h:column>
                    <f:facet name="header">Текущее время</f:facet>
                    #{result.timestamp}
                </h:column>
                <h:column>
                    <f:facet name="header">Результат</f:facet>
                    <h:outputText value="#{result.hit ? '✓' : '✗'}"
                                  style="color: #{result.hit ? 'green' : 'red'}"/>
                </h:column>
            </h:dataTable>
        </h:form>
    </div>
    <div class="return-button">
        <h:button value="Стартовая страница" outcome="index" styleClass="glass-button"/>
    </div>
    <div class="glass-container" style="margin-top: 30px; padding: 25px;">
        <h3 style="text-align: center; color: #e0e7ff; margin-bottom: 20px;">
            Отчёт на почту через N часов
        </h3>

        <h:form id="reportForm">
            <div style="display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap;">
                <h:inputText value="#{pointBean.reportEmail}"
                             placeholder="s471800@niuitmo.ru"
                             styleClass="glass-input"
                             style="width: 320px; padding: 14px; font-size: 16px;"
                             required="true"
                             requiredMessage="Введите email!">
                </h:inputText>

                <h:inputText value="#{pointBean.delayHours}"
                             styleClass="glass-input"
                             style="width: 120px; text-align: center;"
                             required="true"
                             requiredMessage="Введите количество часов">
                    <f:convertNumber />
                    <f:validateDoubleRange minimum="0.016" maximum="72"/>
                </h:inputText>
                <span style="color: #cdd6f3; font-size: 16px;">часов</span>

                <h:commandButton value="Запланировать отчёт"
                                 action="#{pointBean.scheduleReport}"
                                 styleClass="glass-button"
                                 style="background: linear-gradient(45deg, #667eea, #764ba2);">
                    <f:ajax execute="@form" render="reportMessages"/>
                </h:commandButton>
            </div>

            <h:panelGroup id="reportMessages" style="margin-top: 20px; text-align: center;">
                <h:messages globalOnly="false"
                            style="padding: 12px 20px; border-radius: 10px; font-weight: bold; font-size: 18px;"
                            infoStyle="color: #a8ffbc; background: rgba(0,255,0,0.2);"
                            errorStyle="color: #ff6b6b; background: rgba(255,0,0,0.2);"/>
            </h:panelGroup>
        </h:form>
    </div>
    <h:outputScript name="js/graph.js"/>
</h:body>
</html>
