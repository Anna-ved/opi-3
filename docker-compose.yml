version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: postgres-db-weblab3
    environment:
      POSTGRES_DB: weblab3
      POSTGRES_USER: rozze
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: